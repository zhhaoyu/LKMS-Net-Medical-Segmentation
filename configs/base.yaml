model:
  input_height: 256
  input_width: 256
  input_channels: 3
  output_channels: 1

training:
  batch_size: 4
  epochs: 50
  learning_rate: 0.001
  validation_split: 0.2
  patience: 15
  shuffle: true
  num_workers: 2

save:
  checkpoint_dir: "checkpoints"
  log_dir: "logs"
  best_model_name: "best_model.hdf5"
  log_name: "training_log.csv"
